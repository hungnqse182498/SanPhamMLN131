<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philosophy Chat Widget</title>
  <!-- Thêm thư viện marked.js để render markdown chuẩn xác -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f4f7fb;
      /* Background just to show it's embedded */
      min-height: 100vh;
    }
    
    /* WIDGET STYLES */
    .chat-widget-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
      cursor: pointer;
      z-index: 9999;
      font-size: 28px;
      transition: transform 0.2s;
    }
    .chat-widget-fab:hover {
      transform: scale(1.05);
    }

    .chat-widget-window {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 360px;
      height: 550px;
      max-height: calc(100vh - 120px);
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      z-index: 9999;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .chat-widget-window.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .chat-header {
      background: #2563eb;
      color: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    .chat-header .title {
      font-size: 16px;
    }
    .chat-header .close-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .chatbox {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f9fafb;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
    }
    
    /* Markdown Styles inside .msg */
    .msg p { margin: 0 0 8px; }
    .msg p:last-child { margin-bottom: 0; }
    .msg ul, .msg ol { margin: 6px 0; padding-left: 20px; }
    .msg li { margin: 2px 0; }
    .msg strong { font-weight: 700; }
    .msg h1, .msg h2, .msg h3, .msg h4 { margin: 12px 0 6px; font-weight: 700; }
    .msg h1 { font-size: 18px; }
    .msg h2 { font-size: 16px; }
    .msg h3 { font-size: 15px; }
    .msg hr { border: 0; border-top: 1px solid #e5e7eb; margin: 12px 0; }
    .msg pre { background: #1f2937; color: white; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
    .msg code { background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; font-size: 13px; font-family: monospace; }
    .msg pre code { background: transparent; padding: 0; }
    
    .user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bot {
      align-self: flex-start;
      background: white;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    .meta {
      font-size: 11px;
      color: #6b7280;
      margin-top: 6px;
    }

    /* Source Details Accordion */
    .source-details {
      margin-top: 12px;
      font-size: 12px;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
    }
    .source-details summary {
      cursor: pointer;
      font-weight: 600;
      color: #4b5563;
      user-select: none;
      outline: none;
    }
    .source-details summary:hover {
      color: #2563eb;
    }
    .source-content {
      margin-top: 8px;
      color: #374151;
      border-top: 1px solid #d1d5db;
      padding-top: 8px;
    }
    .source-content pre {
      background: #fff;
      color: #1f2937;
      padding: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: inherit;
    }

    /* Typing Animation */
    .typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      min-height: 20px;
      padding: 0 4px;
    }
    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #9ca3af;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .chat-input-area {
      padding: 12px;
      background: white;
      border-top: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-input-area form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin: 0;
    }
    textarea {
      flex: 1;
      min-height: 20px;
      max-height: 120px;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    textarea:focus {
      border-color: #2563eb;
    }
    .send-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .send-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* Tools / Debug */
    .details {
      margin-top: 8px;
      border-top: 1px solid #e5e7eb;
      padding-top: 6px;
    }
    .details-toggle {
      background: transparent;
      border: none;
      color: #6b7280;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0;
    }
    .details-panel {
      display: none;
      margin-top: 6px;
      font-size: 11px;
      color: #4b5563;
      background: #f3f4f6;
      border-radius: 6px;
      padding: 8px;
    }
    .details-panel.open { display: block; }
    
    .status-text {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      height: 16px;
    }
  </style>
</head>
<body>

  <!-- Demo page content -->
  <div style="padding: 40px; text-align: center; color: #4b5563;">
    <h1>Trang web mẫu</h1>
    <p>Widget được nhúng ở góc dưới bên phải màn hình. Nhấn vào biểu tượng chat để mở.</p>
  </div>

  <!-- WIDGET -->
  <div class="chat-widget-fab" id="fab">
    💬
  </div>

  <div class="chat-widget-window" id="chatWindow">
    <div class="chat-header">
      <div class="title">Chatbot Triết học</div>
      <button class="close-btn" id="closeBtn">&times;</button>
    </div>
    
    <div class="chatbox" id="chatbox">
      <div class="msg bot">Xin chào! Hãy hỏi mình về môn triết học hoặc nội dung MLN131.</div>
    </div>
    
    <div class="chat-input-area">
      <div class="status-text" id="status"></div>
      <form id="chatForm">
        <textarea id="question" rows="1" placeholder="Nhập câu hỏi... (Shift+Enter xuống dòng)"></textarea>
        <button class="send-btn" type="submit" id="sendBtn">➤</button>
      </form>
    </div>
  </div>

  <script>
    const fab = document.getElementById('fab');
    const chatWindow = document.getElementById('chatWindow');
    const closeBtn = document.getElementById('closeBtn');
    const chatbox = document.getElementById('chatbox');
    const form = document.getElementById('chatForm');
    const questionInput = document.getElementById('question');
    const statusEl = document.getElementById('status');
    const sendBtn = document.getElementById('sendBtn');

    // Toggle widget
    fab.addEventListener('click', () => {
      chatWindow.classList.add('open');
      questionInput.focus();
    });
    closeBtn.addEventListener('click', () => {
      chatWindow.classList.remove('open');
    });

    // Auto resize textarea
    questionInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      if (this.value === '') this.style.height = 'auto';
    });

    // Submit on Enter
    questionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit'));
      }
    });

    function scrollToBottom() {
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const question = questionInput.value.trim();
      if (!question) return;

      // Add user msg
      const userMsg = document.createElement('div');
      userMsg.className = 'msg user';
      userMsg.textContent = question;
      chatbox.appendChild(userMsg);
      scrollToBottom();

      questionInput.value = '';
      questionInput.style.height = 'auto';
      statusEl.textContent = 'Đang phân tích...';
      sendBtn.disabled = true;

      // Prepare bot message container with Typing indicator
      const botMsg = document.createElement('div');
      botMsg.className = 'msg bot';
      const contentEl = document.createElement('div');
      contentEl.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      botMsg.appendChild(contentEl);
      chatbox.appendChild(botMsg);
      scrollToBottom();

      try {
        const response = await fetch('/chat_stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        if (!response.ok) throw new Error("Lỗi kết nối");

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let fullText = "";
        let metaSources = [];
        let metaContext = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          
          buffer += decoder.decode(value, { stream: true });
          
          // Parse SSE lines
          let lines = buffer.split('\n');
          buffer = lines.pop(); // keep the incomplete line in buffer
          
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const dataStr = line.substring(6);
              if (!dataStr) continue;
              try {
                const data = JSON.parse(dataStr);
                
                if (data.type === 'meta') {
                  statusEl.textContent = 'Đang trả lời...';
                  metaSources = data.sources || [];
                  metaContext = data.context_preview || "";
                } else if (data.type === 'chunk') {
                  fullText += data.text;
                  if (fullText.trim().length > 0) {
                    contentEl.innerHTML = marked.parse(fullText);
                  }
                  scrollToBottom();
                } else if (data.type === 'end') {
                  // Add Source accordion
                  if (metaContext) {
                    const sourceWrap = document.createElement('details');
                    sourceWrap.className = 'source-details';
                    sourceWrap.innerHTML = `
                      <summary>📄 Xem Nguồn & Nội dung tham khảo</summary>
                      <div class="source-content">
                        <strong>Nguồn tài liệu:</strong> ${metaSources.join(', ') || 'Không rõ'}<br/><br/>
                        <strong>Nội dung truy xuất từ kho dữ liệu:</strong><br/>
                        <pre>${metaContext.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                      </div>
                    `;
                    botMsg.appendChild(sourceWrap);
                  }
                  // Add debug info
                  if (data.debug) {
                    const debugWrap = document.createElement('div');
                    debugWrap.className = 'details';
                    debugWrap.innerHTML = `
                      <button class="details-toggle">▶ Chi tiết xử lý (${data.debug.total_seconds}s)</button>
                      <div class="details-panel">
                        <div>Retrieve: ${data.debug.retrieve_seconds || 0}s</div>
                        <div>LLM: ${data.debug.llm_seconds || 0}s</div>
                        <div>Nguồn: ${data.debug.source_count || 0}</div>
                      </div>
                    `;
                    debugWrap.querySelector('.details-toggle').onclick = (e) => {
                      e.target.nextElementSibling.classList.toggle('open');
                      scrollToBottom();
                    };
                    botMsg.appendChild(debugWrap);
                  }
                  statusEl.textContent = '';
                }
              } catch (e) {
                console.error("SSE Parse error", e, dataStr);
              }
            }
          }
        }
        statusEl.textContent = '';
      } catch (error) {
        contentEl.textContent = "Xin lỗi, đã có lỗi xảy ra.";
        statusEl.textContent = 'Lỗi!';
      } finally {
        sendBtn.disabled = false;
        scrollToBottom();
      }
    });
  </script>
</body>
</html>
